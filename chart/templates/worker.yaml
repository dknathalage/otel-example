{{- if .Values.components.worker.enabled }}
{{- $c := .Values.components.worker }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: {{ include "otel-stack.namespace" . }}
  labels:
    {{- include "otel-stack.labels" . | nindent 4 }}
    app.kubernetes.io/name: worker
spec:
  replicas: {{ $c.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: worker
  template:
    metadata:
      labels:
        {{- include "otel-stack.labels" . | nindent 8 }}
        app.kubernetes.io/name: worker
    spec:
      serviceAccountName: {{ include "otel-stack.serviceAccountName" . }}
      containers:
        - name: worker
          image: "{{ include "otel-stack.image" (dict "comp" $c "root" .) }}"
          env:
            - { name: OTEL_EXPORTER_OTLP_ENDPOINT, value: "{{ include "otel-stack.otlpEndpoint" . }}" }
            - { name: OTEL_EXPORTER_OTLP_PROTOCOL, value: "http/protobuf" }
            - { name: OTEL_RESOURCE_ATTRIBUTES, value: "{{ include "otel-stack.resourceAttributes" . }}" }
            # Register Core.Telemetry's ActivitySource so manual spans + the Pub/Sub
            # traceparent linkage are exported by the auto-instr agent.
            - { name: OTEL_DOTNET_AUTO_TRACES_ADDITIONAL_SOURCES, value: "OtelPoc" }
            - { name: Gcp__ProjectId, value: "{{ .Values.gcpProject }}" }
            - { name: PubSub__ProjectId, value: "{{ .Values.gcpProject }}" }
            - { name: PubSub__TopicId, value: "{{ include "otel-stack.topic" . }}" }
            - { name: PubSub__SubscriptionId, value: "{{ include "otel-stack.subscription" . }}" }
            - { name: Firestore__ProjectId, value: "{{ .Values.gcpProject }}" }
            - { name: Firestore__CollectionPrefix, value: "{{ include "otel-stack.prefix" . }}" }
          {{- with $c.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
