{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.appName }}
  namespace: {{ include "otel-stack.namespace" . }}
  labels:
    {{- include "otel-stack.labels" . | nindent 4 }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    {{- if .Values.components.web.enabled }}
    # Web UI
    - host: "web-{{ include "otel-stack.release" . }}.{{ .Values.ingress.host }}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
    {{- end }}
    {{- if .Values.components.api.enabled }}
    # API
    - host: "api-{{ include "otel-stack.release" . }}.{{ .Values.ingress.host }}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 80
    {{- end }}
    {{- /*
      NOTE: the collector is intentionally NOT exposed via this Ingress.
      Doing so makes GKE attach a NEG readiness gate to the collector pod; the L7
      health check probes GET / on :4318, but the OTLP/HTTP receiver returns 404 for /
      (it only serves /v1/{traces,metrics,logs}). The gate then never clears, the
      collector Service loses all endpoints, and in-cluster app->collector exports are
      dropped. App->collector is pure ClusterIP and needs no Ingress. To re-enable
      browser OTLP ingest later, use a separate Service + BackendConfig health check
      pointing at the collector health_check extension (:13133), not GET / on :4318.
    */}}
{{- end }}
