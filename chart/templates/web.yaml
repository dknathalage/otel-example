{{- if .Values.components.web.enabled }}
{{- $c := .Values.components.web }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: {{ include "otel-stack.namespace" . }}
  labels:
    {{- include "otel-stack.labels" . | nindent 4 }}
    app.kubernetes.io/name: web
spec:
  replicas: {{ $c.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: web
  template:
    metadata:
      labels:
        {{- include "otel-stack.labels" . | nindent 8 }}
        app.kubernetes.io/name: web
    spec:
      serviceAccountName: {{ include "otel-stack.serviceAccountName" . }}
      containers:
        - name: web
          image: "{{ include "otel-stack.image" (dict "comp" $c "root" .) }}"
          ports:
            - { name: http, containerPort: 3000 }
          # TCP probe so the health check generates no instrumented HTTP request
          # (avoids noisy "GET /" spans from @vercel/otel).
          readinessProbe:
            tcpSocket: { port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            # K8s auto-sets HOSTNAME=<pod-name>; Next standalone server binds to it
            # instead of 0.0.0.0, so 127.0.0.1:3000 (port-forward) is refused. Pin it.
            - { name: HOSTNAME, value: "0.0.0.0" }
            - { name: OTEL_EXPORTER_OTLP_ENDPOINT, value: "{{ include "otel-stack.otlpEndpoint" . }}" }
            - { name: OTEL_EXPORTER_OTLP_PROTOCOL, value: "http/protobuf" }
            - { name: OTEL_RESOURCE_ATTRIBUTES, value: "{{ include "otel-stack.resourceAttributes" . }}" }
            - { name: NEXT_PUBLIC_API_URL, value: "{{ $c.apiUrl }}" }
            - { name: NEXT_PUBLIC_OTLP_HTTP_URL, value: "{{ $c.otlpHttpUrl }}" }
          {{- with $c.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: {{ include "otel-stack.namespace" . }}
  labels:
    {{- include "otel-stack.labels" . | nindent 4 }}
    app.kubernetes.io/name: web
spec:
  selector:
    app.kubernetes.io/name: web
  ports:
    - { name: http, port: 80, targetPort: 3000 }
{{- end }}
