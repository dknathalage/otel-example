{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.appName }}
  namespace: {{ include "otel-stack.namespace" . }}
  labels:
    {{- include "otel-stack.labels" . | nindent 4 }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    {{- if .Values.components.web.enabled }}
    # Web UI
    - host: "web-{{ include "otel-stack.release" . }}.{{ .Values.ingress.host }}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
    {{- end }}
    {{- if .Values.components.api.enabled }}
    # API
    - host: "api-{{ include "otel-stack.release" . }}.{{ .Values.ingress.host }}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 80
    {{- end }}
    {{- if .Values.collector.enabled }}
    # Browser OTLP/http ingest into the collector
    - host: "otlp-{{ include "otel-stack.release" . }}.{{ .Values.ingress.host }}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: collector
                port:
                  number: 4318
    {{- end }}
{{- end }}
