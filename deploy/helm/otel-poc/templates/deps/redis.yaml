{{- if .Values.deps.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  labels:
    {{- include "otel-poc.labels" . | nindent 4 }}
    app.kubernetes.io/name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        {{- include "otel-poc.labels" . | nindent 8 }}
        app.kubernetes.io/name: redis
    spec:
      containers:
        - name: redis
          image: redis:7
          ports:
            - { name: redis, containerPort: 6379 }
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  labels:
    {{- include "otel-poc.labels" . | nindent 4 }}
    app.kubernetes.io/name: redis
spec:
  selector:
    app.kubernetes.io/name: redis
  ports:
    - { name: redis, port: 6379, targetPort: 6379 }
{{- end }}
