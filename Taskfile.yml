version: "3"
# Build + deploy the OTel multi-backend POC to GKE.
#
#   export GCP_PROJECT=my-project [GCP_REGION=us-central1] [APP_NAME=otel-poc]
#   task ship PROVIDER=google     # build amd64 + push + helm install (one backend)
#   task build                    # build all 3 amd64 images
#   task push                     # push images to Artifact Registry
#   task install PROVIDER=dash0   # helm upgrade --install one backend stack
#
# Images are built linux/amd64 (GKE nodes are amd64) via Docker Desktop + Rosetta x86
# emulation, which (unlike qemu) does not crash .NET's MSBuild when cross-building on an
# arm64 Mac. The .NET apps publish INSIDE the image (proper multi-stage build). Requires
# a running Docker Desktop with Rosetta amd64 emulation enabled.
# Set GCP_PROJECT (required) and optionally GCP_REGION / APP_NAME before running.
# CLOUDSQL_CONN and REDIS_HOST are read live from `terragrunt output` by the install
# task — they require `task apply:foundation` to have run first.
vars:
  TAG: { sh: git rev-parse --short HEAD }
  APP_NAME: { sh: 'echo "${APP_NAME:-otel-poc}"' }
  PROJECT: { sh: 'echo "${GCP_PROJECT:-}"' }   # required for GCP tasks; enforced per-task (see &reqproj)
  REGION: { sh: 'echo "${GCP_REGION:-us-central1}"' }
  REGISTRY: '{{.REGION}}-docker.pkg.dev/{{.PROJECT}}/{{.APP_NAME}}'
  CLUSTER: '{{.CLUSTER | default .APP_NAME}}'

tasks:
  login:
    desc: Log docker into Artifact Registry via gcloud token
    preconditions: &reqproj
      - sh: '[ -n "{{.PROJECT}}" ]'
        msg: "GCP_PROJECT must be set, e.g. export GCP_PROJECT=my-project"
    cmds:
      - gcloud auth print-access-token | docker login -u oauth2accesstoken --password-stdin {{.REGISTRY | splitList "/" | first}}

  images:
    desc: Build all three linux/amd64 images (multi-stage, publishes .NET inside the image)
    preconditions: *reqproj
    cmds:
      - docker build --platform linux/amd64 -t {{.REGISTRY}}/api:{{.TAG}} -f src/Api/Dockerfile .
      - docker build --platform linux/amd64 -t {{.REGISTRY}}/worker:{{.TAG}} -f src/Worker/Dockerfile .
      - docker build --platform linux/amd64 --build-arg NEXT_PUBLIC_OTLP_HTTP_URL=/api/otlp/v1/traces -t {{.REGISTRY}}/web:{{.TAG}} -f src/Web/Dockerfile src/Web

  push:
    desc: Push the built images to Artifact Registry
    preconditions: *reqproj
    cmds:
      - for: [api, worker, web]
        cmd: docker push {{.REGISTRY}}/{{.ITEM}}:{{.TAG}}

  build:
    desc: Build all images (no push)
    deps: [images]

  creds:gke:
    desc: Point kubeconfig at the GKE cluster (override CLUSTER/REGION/PROJECT)
    preconditions: *reqproj
    cmds:
      - gcloud container clusters get-credentials {{.CLUSTER}} --region {{.REGION}} --project {{.PROJECT}}

  apply:foundation:
    desc: Apply the GCP foundation (AR, GSA/WIF, GSM, Pub/Sub, Firestore, Cloud SQL, Memorystore)
    dir: infra/live/foundation
    cmds: ["terragrunt apply -auto-approve --non-interactive"]

  apply:autopilot:
    desc: Create the Autopilot cluster (optional — skip if using an existing cluster)
    dir: infra/live/autopilot
    cmds: ["terragrunt apply -auto-approve --non-interactive"]

  install:
    desc: Install one backend stack into its namespace (PROVIDER=google|dash0|coralogix)
    preconditions: *reqproj
    vars:
      PROVIDER: '{{.PROVIDER | default "google"}}'
      CLOUDSQL_CONN: { sh: 'cd infra/live/foundation && terragrunt output -raw cloudsql_connection_name' }
      CLOUDSQL_PW: { sh: 'cd infra/live/foundation && terragrunt output -raw cloudsql_password' }
      REDIS_HOST: { sh: 'cd infra/live/foundation && terragrunt output -raw redis_host' }
    cmds:
      - >-
        helm upgrade --install {{.APP_NAME}}-{{.PROVIDER}} ./chart
        -f chart/values-{{.PROVIDER}}.yaml
        --set appName={{.APP_NAME}}
        --set gcpProject={{.PROJECT}}
        --set region={{.REGION}}
        --set image.registry={{.REGISTRY}}
        --set image.tag={{.TAG}}
        --set components.api.cloudsql.connectionName={{.CLOUDSQL_CONN}}
        --set components.api.cloudsql.password={{.CLOUDSQL_PW}}
        --set components.api.redis.host={{.REDIS_HOST}}
        -n {{.APP_NAME}}-{{.PROVIDER}} --create-namespace

  ship:
    desc: Full path — login, build+push amd64 images, deploy one backend (PROVIDER=google)
    vars:
      PROVIDER: '{{.PROVIDER | default "google"}}'
    cmds:
      - task: login
      - task: images
      - task: push
      - task: install
        vars: { PROVIDER: "{{.PROVIDER}}" }

  pf:
    desc: Port-forward the web UI (localhost:3000) for one release (PROVIDER=google). This is
      all you need — the API and collector are private; the web server proxies browser
      requests to them in-cluster (browser → web → api / collector).
    vars: { PROVIDER: '{{.PROVIDER | default "google"}}' }
    cmds:
      - echo "Open http://localhost:3000  (Ctrl-C to stop)"
      - kubectl port-forward -n {{.APP_NAME}}-{{.PROVIDER}} svc/web 3000:80

  # --- Debug-only forwards (NOT needed for the app; the API/collector are reached
  #     in-cluster via the web proxy). Use these to hit the API or collector directly. ---
  pf:api:
    desc: "[debug] Port-forward the private API (localhost:8080) for one release (PROVIDER=google)"
    vars: { PROVIDER: '{{.PROVIDER | default "google"}}' }
    cmds: ["kubectl port-forward -n {{.APP_NAME}}-{{.PROVIDER}} svc/api 8080:80"]

  pf:collector:
    desc: "[debug] Port-forward the collector OTLP (4318 http / 4317 grpc) for one release (PROVIDER=google)"
    vars: { PROVIDER: '{{.PROVIDER | default "google"}}' }
    cmds: ["kubectl port-forward -n {{.APP_NAME}}-{{.PROVIDER}} svc/collector 4318:4318 4317:4317"]
