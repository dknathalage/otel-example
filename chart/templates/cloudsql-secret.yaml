{{- if .Values.components.api.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: cloudsql
  namespace: {{ include "otel-stack.namespace" . }}
  labels:
    {{- include "otel-stack.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.components.api.cloudsql.password | quote }}
{{- end }}
