{{- $be := .Values.backend -}}
{{- $gcp := eq $be.type "googleAuthOtlp" -}}
{{- $dbg := .Values.collector.debug -}}
{{- $exp := ternary "coralogix" "otlphttp/be" (eq $be.type "coralogix") -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: collector-config
  namespace: {{ include "otel-stack.namespace" . }}
  labels:
    {{- include "otel-stack.labels" . | nindent 4 }}
data:
  config.yaml: |
    extensions:
      {{- if $gcp }}
      googleclientauth: {}
      {{- end }}
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
            cors:
              allowed_origins: ["{{ .Values.webOrigin }}"]
              allowed_headers: ["*"]
    processors:
      batch: {}
      # Drop Kubernetes health-check probe traffic so it is neither traced nor logged:
      # liveness/readiness probes carry a "kube-probe/<ver>" user agent; health logs hit /healthz.
      filter/health:
        error_mode: ignore
        traces:
          span:
            - 'IsString(attributes["user_agent.original"]) and IsMatch(attributes["user_agent.original"], "^kube-probe")'
            - 'IsString(attributes["url.path"]) and attributes["url.path"] == "/healthz"'
            - 'name == "GET /healthz"'
        logs:
          log_record:
            - 'IsString(attributes["url.path"]) and attributes["url.path"] == "/healthz"'
            - 'IsString(body) and IsMatch(body, "/healthz")'
      {{- if $gcp }}
      resource/gcp:
        attributes:
          - { key: gcp.project_id, value: "{{ .Values.gcpProject }}", action: upsert }
      resourcedetection/gcp:
        detectors: [env, gcp]
        timeout: 2s
        override: false
      {{- end }}
    exporters:
      {{- if $dbg }}
      debug:
        verbosity: detailed
      {{- end }}
      {{- if $gcp }}
      otlphttp/be:
        endpoint: {{ $be.endpoint }}
        encoding: proto
        auth:
          authenticator: googleclientauth
      # Logs go through the googlecloud exporter (not the OTLP telemetry endpoint):
      # it writes to the Cloud Logging API and sets the entry's trace/spanId fields
      # from the OTLP trace context, so logs correlate with traces in the UI.
      googlecloud:
        project: {{ .Values.gcpProject }}
        log:
          default_log_name: {{ .Values.appName | quote }}
      {{- else if eq $be.type "otlphttp" }}
      otlphttp/be:
        endpoint: {{ $be.endpoint }}
        {{- if or $be.headers $be.auth }}
        headers:
          {{- range $k, $v := $be.headers }}
          {{ $k }}: "{{ $v }}"
          {{- end }}
          {{- if $be.auth }}
          {{ $be.auth.header }}: "{{ $be.auth.scheme }} {{ include "otel-stack.secretRef" (dict "root" $ "name" $be.auth.secretRef) }}"
          {{- end }}
        {{- end }}
      {{- else if eq $be.type "coralogix" }}
      coralogix:
        domain: "{{ $be.domain }}"
        private_key: "{{ include "otel-stack.secretRef" (dict "root" $ "name" $be.auth.secretRef) }}"
        application_name: "{{ $be.appName | default $.Values.appName }}"
        subsystem_name: "${env:HOSTNAME}"
      {{- end }}
    service:
      {{- if $gcp }}
      extensions: [googleclientauth]
      {{- end }}
      pipelines:
        traces:
          receivers: [otlp]
          processors: [filter/health, batch{{ if $gcp }}, resource/gcp, resourcedetection/gcp{{ end }}]
          exporters: [{{ if $dbg }}debug, {{ end }}{{ $exp }}]
        metrics:
          receivers: [otlp]
          processors: [batch{{ if $gcp }}, resource/gcp, resourcedetection/gcp{{ end }}]
          exporters: [{{ if $dbg }}debug, {{ end }}{{ $exp }}]
        logs:
          receivers: [otlp]
          processors: [filter/health, batch{{ if $gcp }}, resource/gcp, resourcedetection/gcp{{ end }}]
          exporters: [{{ if $dbg }}debug, {{ end }}{{ if $gcp }}googlecloud{{ else }}{{ $exp }}{{ end }}]
          exporters: [{{ if $dbg }}debug, {{ end }}{{ $exp }}]
