# Coralogix backend overlay. Install (namespace follows the install -n):
#   helm upgrade --install <appName>-coralogix ./chart -f chart/values-coralogix.yaml \
#     -n <appName>-coralogix --create-namespace

backend:
  type: coralogix
  domain: eu2.coralogix.com         # set to your Coralogix domain
  # appName: (unset)                # Coralogix application_name; defaults to .Values.appName
  auth:
    secretRef: coralogix-key        # GSM secret name (value provisioned by tofu)
