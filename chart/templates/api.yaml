apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    {{- include "otel-poc.labels" . | nindent 4 }}
    app.kubernetes.io/name: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api
  template:
    metadata:
      labels:
        {{- include "otel-poc.labels" . | nindent 8 }}
        app.kubernetes.io/name: api
    spec:
      serviceAccountName: otel-poc
      containers:
        - name: api
          image: "{{ .Values.image.registry }}/api:{{ .Values.image.tag }}"
          ports:
            - { name: http, containerPort: 8080 }
          env:
            - { name: OTEL_EXPORTER_OTLP_ENDPOINT, value: "{{ include "otel-poc.otlpEndpoint" . }}" }
            - { name: OTEL_RESOURCE_ATTRIBUTES, value: "{{ include "otel-poc.resourceAttributes" . }}" }
            - { name: ASPNETCORE_URLS, value: "http://0.0.0.0:8080" }
            - { name: Gcp__ProjectId, value: "{{ .Values.gcpProject }}" }
            # Cloud SQL: app talks to the Auth Proxy sidecar on 127.0.0.1:5432.
            - name: CLOUDSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cloudsql
                  key: password
            - name: ConnectionStrings__Orders
              value: "Host=127.0.0.1;Port=5432;Database={{ include "otel-poc.pgdb" . }};Username={{ .Values.cloudsql.user }};Password=$(CLOUDSQL_PASSWORD)"
            - { name: Redis__ConnectionString, value: "{{ .Values.redis.host }}:{{ .Values.redis.port }}" }
            - { name: Redis__KeyPrefix, value: "{{ include "otel-poc.prefix" . }}" }
            - { name: PubSub__ProjectId, value: "{{ .Values.gcpProject }}" }
            - { name: PubSub__TopicId, value: "{{ include "otel-poc.topic" . }}" }
            - { name: PubSub__SubscriptionId, value: "{{ include "otel-poc.subscription" . }}" }
        # Cloud SQL Auth Proxy: authenticates via Workload Identity, exposes Postgres on localhost.
        - name: cloud-sql-proxy
          image: "gcr.io/cloud-sql-connectors/cloud-sql-proxy:latest"
          args:
            - "--structured-logs"
            - "--port=5432"
            - "$(CLOUDSQL_CONNECTION_NAME)"
          env:
            - { name: CLOUDSQL_CONNECTION_NAME, value: "{{ .Values.cloudsql.connectionName }}" }
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api
  labels:
    {{- include "otel-poc.labels" . | nindent 4 }}
    app.kubernetes.io/name: api
spec:
  selector:
    app.kubernetes.io/name: api
  ports:
    - { name: http, port: 80, targetPort: 8080 }
