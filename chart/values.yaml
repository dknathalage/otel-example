# otel-stack — single-backend microservice stack (api + worker + web + collector).
# Install once per backend/namespace. The base file targets the Google backend; dash0 /
# coralogix are thin overlays (values-*.yaml). Project/region/registry/SA are supplied at
# install time (see Taskfile) so nothing here is tied to one GCP project.

# ── Release target (per-install) ──
appName: otel-poc             # base name; drives namespace prefix, service account,
                              # release-prefix strip, labels, ingress. MUST equal the
                              # tofu `name` (APP_NAME). Override individual fields below.
nameOverride: ""              # overrides the release-prefix strip in the name helper
# namespace: (unset)          # defaults to the install `-n` (Release.Namespace). The
                              # Taskfile installs into <appName>-<provider>.
gcpProject: ""                # set at install time (--set), e.g. via $GCP_PROJECT
region: ""                    # GCP region — resource attributes only; set at install
                              # time. NOT the dash0 AWS region (that's in backend.endpoint).

# ── Backend: the ONE backend this release exports to ──
backend:
  type: googleAuthOtlp        # googleAuthOtlp | otlphttp | coralogix
  endpoint: https://telemetry.googleapis.com

# ── Collector ──
collector:
  enabled: true
  image: us-docker.pkg.dev/cloud-ops-agents-artifacts/google-cloud-opentelemetry-collector/otelcol-google:0.151.0
  debug: true
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 512Mi }

# ── Image defaults (global) ── keeps the CI `--set image.tag=<git-sha>` flow working.
# Per-component blocks supply `repo`; registry/tag inherit unless overridden.
image:
  registry: ""                # set at install time (--set), e.g. <region>-docker.pkg.dev/<project>/<appName>
  tag: dev

# ── Components ──
components:
  api:
    enabled: true
    image: { repo: api }
    replicas: 1
    resources: {}
    cloudsql: { connectionName: "", user: otel, password: "otelpoc-dev-pw" }
    redis:    { host: "", port: 6379 }
    pubsub:   { enabled: true }
  worker:
    enabled: true
    image: { repo: worker }
    replicas: 1
    resources: {}
  web:
    enabled: true
    image: { repo: web }
    replicas: 1
    resources: {}
    apiUrl: "https://api.example.com"
    otlpHttpUrl: "https://otlp.example.com/v1/traces"

# ── Ingress / browser ──
ingress:
  enabled: true
  className: ""
  host: example.com
webOrigin: "https://web.example.com"

# ── Workload Identity ──
# serviceAccountName defaults to appName and MUST equal the tofu ksa_name the WIF binding
# targets (both derive from the same base name). gcpServiceAccount defaults to
# <serviceAccountName>@<gcpProject>.iam.gserviceaccount.com; override only if your GSA
# email differs. Set explicitly to override either.
serviceAccountName: ""
gcpServiceAccount: ""
