# GKE overrides. All data is managed cloud (Cloud SQL / Memorystore / Pub-Sub / Firestore);
# there are no in-cluster deps. Auth on GKE is Workload Identity (no ADC secret).
env: gke
gcpProject: focal-fossa-dev

# Artifact Registry path for the built images. Override image.tag at install time.
image:
  registry: "us-central1-docker.pkg.dev/focal-fossa-dev/otel-poc"
  tag: "dev"

# WIF: GCP service account email bound to the KSA.
gcpServiceAccount: "otel-poc@focal-fossa-dev.iam.gserviceaccount.com"

collector:
  debug: true

# connectionName and redis.host are filled at deploy time via --set from Tofu outputs.
cloudsql:
  connectionName: ""
  user: otel
  password: "otelpoc-dev-pw"
redis:
  host: ""
  port: 6379

providers:
  dash0:
    region: us-west-2
    dataset: otel-poc
  coralogix:
    domain: eu2.coralogix.com

webOrigin: "https://web.example.com"
ingress:
  enabled: true
  host: "example.com"
web:
  apiUrl: "https://api.example.com"
  otlpHttpUrl: "https://otlp.example.com/v1/traces"
