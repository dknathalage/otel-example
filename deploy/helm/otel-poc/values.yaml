# Which backend this release exports to. One of: google | dash0 | coralogix
provider: google

# Deployment environment. One of: local | gke
env: local

# GCP project id. Rendered into the collector config (resource/gcp value + GSM URIs).
gcpProject: ""

# App container images. Match the local podman image names: otel-poc/api:dev etc.
image:
  registry: "otel-poc"
  tag: "dev"

# Collector image. Google-Built OpenTelemetry Collector distro: it bundles BOTH the
# googleclientauth extension (Google OTLP auth) AND the googlesecretmanager confmap
# provider (used by the dash0/coralogix GSM secret refs).
collector:
  image: "us-docker.pkg.dev/cloud-ops-agents-artifacts/google-cloud-opentelemetry-collector/otelcol-google:0.151.0"

# Per-provider settings.
providers:
  google: {}
  dash0:
    region: us-west-2
    dataset: otel-poc
  coralogix:
    domain: eu2.coralogix.com

# Workload Identity: GCP service account email bound to the KSA (only used when env=gke).
gcpServiceAccount: ""

# In-namespace dependency emulators (Postgres/Redis/Pub-Sub/Firestore). Local only.
deps:
  enabled: true

# Browser origin allowed by the collector OTLP/http CORS config (never "*").
webOrigin: "http://localhost:3000"

# Ingress host suffix; per-component hosts are derived from the release name.
ingress:
  enabled: true
  className: ""
  host: "localhost"

# Public URLs handed to the web app (browser-side).
web:
  apiUrl: "http://localhost/api"
  otlpHttpUrl: "http://localhost/otlp/v1/traces"
