# otel-stack — single-backend microservice stack (api + worker + web + collector).
# Install once per backend/namespace; the base file targets the Google backend in the
# otel-poc-google namespace. dash0 / coralogix are thin overlays (values-*.yaml).

# ── Release target (per-install) ──
nameOverride: ""              # overrides the chart name in the release/name helper
namespace: otel-poc-google    # rendered into every resource's metadata.namespace; MUST
                              # equal the install `-n`. Matches the tofu WIF binding.
gcpProject: focal-fossa-dev
region: us-central1           # GCP region — resource attributes only. NOT the dash0 AWS
                              # region (that lives literally in backend.endpoint).

# ── Backend: the ONE backend this release exports to ──
backend:
  type: googleAuthOtlp        # googleAuthOtlp | otlphttp | coralogix
  endpoint: https://telemetry.googleapis.com

# ── Collector ──
collector:
  enabled: true
  image: us-docker.pkg.dev/cloud-ops-agents-artifacts/google-cloud-opentelemetry-collector/otelcol-google:0.151.0
  debug: true
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 512Mi }

# ── Image defaults (global) ── keeps the CI `--set image.tag=<git-sha>` flow working.
# Per-component blocks supply `repo`; registry/tag inherit unless overridden.
image:
  registry: us-central1-docker.pkg.dev/focal-fossa-dev/otel-poc
  tag: dev

# ── Components ──
components:
  api:
    enabled: true
    image: { repo: api }
    replicas: 1
    resources: {}
    cloudsql: { connectionName: "", user: otel, password: "otelpoc-dev-pw" }
    redis:    { host: "", port: 6379 }
    pubsub:   { enabled: true }
  worker:
    enabled: true
    image: { repo: worker }
    replicas: 1
    resources: {}
  web:
    enabled: true
    image: { repo: web }
    replicas: 1
    resources: {}
    apiUrl: "https://api.example.com"
    otlpHttpUrl: "https://otlp.example.com/v1/traces"

# ── Ingress / browser ──
ingress:
  enabled: true
  className: ""
  host: example.com
webOrigin: "https://web.example.com"

# ── Workload Identity ──
# KSA name is PINNED to `otel-poc` (the tofu ksa_name the WIF binding targets) — do not
# derive it from the chart/release name. The GSA annotation is always rendered.
serviceAccountName: otel-poc
gcpServiceAccount: "otel-poc@focal-fossa-dev.iam.gserviceaccount.com"
