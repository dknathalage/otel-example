{{- if .Values.deps.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: pubsub-bootstrap
  labels:
    {{- include "otel-poc.labels" . | nindent 4 }}
    app.kubernetes.io/name: pubsub-bootstrap
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        {{- include "otel-poc.labels" . | nindent 8 }}
        app.kubernetes.io/name: pubsub-bootstrap
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: curlimages/curl:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              HOST="pubsub-emulator:8085"
              PROJECT="{{ .Values.gcpProject }}"
              TOPIC="{{ include "otel-poc.topic" . }}"
              SUB="{{ include "otel-poc.subscription" . }}"

              echo "Waiting for ${HOST} to be reachable..."
              until curl -sf -o /dev/null "http://${HOST}/v1/projects/${PROJECT}/topics"; do
                echo "  pubsub emulator not ready yet, retrying in 2s..."
                sleep 2
              done
              echo "pubsub emulator is up."

              # Create topic (200 OK, or 409 already-exists are both success).
              CODE=$(curl -s -o /dev/null -w '%{http_code}' -X PUT \
                "http://${HOST}/v1/projects/${PROJECT}/topics/${TOPIC}")
              echo "create topic ${TOPIC} -> HTTP ${CODE}"
              if [ "${CODE}" != "200" ] && [ "${CODE}" != "409" ]; then
                echo "ERROR: unexpected status creating topic"; exit 1
              fi

              # Create subscription bound to the topic (200 OK or 409 already-exists).
              CODE=$(curl -s -o /dev/null -w '%{http_code}' -X PUT \
                -H 'Content-Type: application/json' \
                -d '{"topic":"projects/'"${PROJECT}"'/topics/'"${TOPIC}"'"}' \
                "http://${HOST}/v1/projects/${PROJECT}/subscriptions/${SUB}")
              echo "create subscription ${SUB} -> HTTP ${CODE}"
              if [ "${CODE}" != "200" ] && [ "${CODE}" != "409" ]; then
                echo "ERROR: unexpected status creating subscription"; exit 1
              fi

              echo "pubsub bootstrap complete."
{{- end }}
